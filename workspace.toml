# workspace.toml
#
# Declared-intent coordination artifact for this repo.
# Each initiative gets its own named section. Run `workspace-status` to surface
# ready items, blocked items, and active signals — or to initialise this file
# with your first initiative and the full schema.
#
# Queue entries are strings (no deps) or inline objects {path/slug, needs}.
# `needs` uses queue-prefix notation:
#   "work:<path>"      — depends on a work queue entry
#   "shape:<slug>"     — depends on a shaping queue entry
#   "research:<slug>"  — depends on a research entry
#   "brief:<path>"     — depends on a brief queue entry
#   "backlog:<slug>"   — depends on a repo-level [backlog] item
#
# The [backlog] section below tracks open work not yet scoped to an initiative.
# Add items as: {slug = "my-deferred-item"}
# Run `workspace-status` to see all open backlog items.

["ini-001"]
name      = "Terraform Migration"
milestone = "M1 · CDK → Terraform parity (5-tier build + verification)"
status    = "closed"

# The CDK→Terraform migration (ADR-0010): a 5-tier build (scaffold → network →
# data+IAM → compute → verification) that reproduces the CDK stack in apps/infra-tf/.
# Tiers 1–4 are shipped; tier 5 (verification) is the last queued item and owns the
# single full-stack live cycle (apply → smoke → destroy). Migration-specific deferred
# follow-ups (IaC scanner/cost gate, the live cycle, per-Lambda hardening) live in the
# repo-level [backlog] below because they are deferral-register anchors referenced by
# spec `(deferred: <slug>)` markers.
["ini-001".work]
# Shipped tiers — bare strings (needs/other fields dropped at ship, per the queue schema).
shipped = [
  "docs/specs/infra-terraform-scaffold/",
  "docs/specs/infra-terraform-network/",
  "docs/specs/infra-terraform-data-and-iam/",
  "docs/specs/infra-terraform-compute/",
  "docs/specs/infra-terraform-verification/",
]
active = []
queue = []

["ini-002"]
name      = "Business Operations Knowledge Graph"
milestone = "M2 · RDF/OWL knowledge platform — ontology, SPARQL, MCP, git ingestion, OTEL"
status    = "shaping"

# Breaking pivot from the Kubernetes demo corpus to a generic business-operations
# knowledge platform. Core changes: Neptune → SPARQL/RDF engine; OWL schema-only
# ontology (Schema.org + SKOS, no reasoning); named-graph normative/descriptive
# partition; MCP tool server (generic typed tools) as primary retrieval interface;
# server-side multi-strategy router with transparent trace; AWS ADOT OTEL
# observability; git commit-SHA delta ingestion replacing S3 content-hash delta.
#
# Supersedes: ADR-0001, ADR-0004, ADR-0008; specs graph-ingestion-resolution,
#             opencypher-templates, text2opencypher-guarded, engine-routing,
#             incremental-delta-reingest.
# Archives:   docs/specs/graph-ingestion-resolution/ (Kubernetes-specific corpus).

["ini-002".shape]
# Design artifacts (ADRs, RFCs, specs) that must be agreed before implementation.
# Wave ordering: each wave unblocks the next; items within a wave run in parallel.
