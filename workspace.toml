# workspace.toml
#
# Declared-intent coordination artifact for this repo.
# Each initiative gets its own named section. Run `workspace-status` to surface
# ready items, blocked items, and active signals — or to initialise this file
# with your first initiative and the full schema.
#
# Queue entries are strings (no deps) or inline objects {path/slug, needs}.
# `needs` uses queue-prefix notation:
#   "work:<path>"      — depends on a work queue entry
#   "shape:<slug>"     — depends on a shaping queue entry
#   "research:<slug>"  — depends on a research entry
#   "brief:<path>"     — depends on a brief queue entry
#   "backlog:<slug>"   — depends on a repo-level [backlog] item
#
# The [backlog] section below tracks open work not yet scoped to an initiative.
# Add items as: {slug = "my-deferred-item"}
# Run `workspace-status` to see all open backlog items.

["ini-001"]
name      = "Terraform Migration"
milestone = "M1 · CDK → Terraform parity (5-tier build + verification)"
status    = "active"

# The CDK→Terraform migration (ADR-0010): a 5-tier build (scaffold → network →
# data+IAM → compute → verification) that reproduces the CDK stack in apps/infra-tf/.
# Tiers 1–4 are shipped; tier 5 (verification) is the last queued item and owns the
# single full-stack live cycle (apply → smoke → destroy). Migration-specific deferred
# follow-ups (IaC scanner/cost gate, the live cycle, per-Lambda hardening) live in the
# repo-level [backlog] below because they are deferral-register anchors referenced by
# spec `(deferred: <slug>)` markers.
["ini-001".work]
# Shipped tiers — bare strings (needs/other fields dropped at ship, per the queue schema).
shipped = [
  "docs/specs/infra-terraform-scaffold/",
  "docs/specs/infra-terraform-network/",
  "docs/specs/infra-terraform-data-and-iam/",
  "docs/specs/infra-terraform-compute/",
  "docs/specs/infra-terraform-verification/",
]
active = []
queue = []

["ini-002"]
name      = "Business Operations Knowledge Graph"
milestone = "M2 · RDF/OWL knowledge platform — ontology, SPARQL, MCP, git ingestion, OTEL"
status    = "shaping"

# Breaking pivot from the Kubernetes demo corpus to a generic business-operations
# knowledge platform. Core changes: Neptune → SPARQL/RDF engine; OWL schema-only
# ontology (Schema.org + SKOS, no reasoning); named-graph normative/descriptive
# partition; MCP tool server (generic typed tools) as primary retrieval interface;
# server-side multi-strategy router with transparent trace; AWS ADOT OTEL
# observability; git commit-SHA delta ingestion replacing S3 content-hash delta.
#
# Supersedes: ADR-0001, ADR-0004, ADR-0008; specs graph-ingestion-resolution,
#             opencypher-templates, text2opencypher-guarded, engine-routing,
#             incremental-delta-reingest.
# Archives:   docs/specs/graph-ingestion-resolution/ (Kubernetes-specific corpus).

["ini-002".shape]
# Design artifacts (ADRs, RFCs, specs) that must be agreed before implementation.
# Wave ordering: each wave unblocks the next; items within a wave run in parallel.
shipped = []
active  = []
queue   = [
  # Wave 1 — pivot rationale; no dependencies
  {slug = "rfc-0004-biz-ops-kg-pivot"},

  # Wave 2 — core technology decisions; both depend on RFC-0004
  {slug = "adr-0011-neptune-sparql",         needs = ["shape:rfc-0004-biz-ops-kg-pivot"]},
  {slug = "adr-0012-owl-schema-only",        needs = ["shape:rfc-0004-biz-ops-kg-pivot"]},

  # Wave 3 — data model, routing, ingestion decisions; depend on ADR-0011/0012
  {slug = "spec-rdf-owl-ontology",           needs = ["shape:adr-0012-owl-schema-only"]},
  {slug = "adr-0013-multi-strategy-routing", needs = ["shape:adr-0011-neptune-sparql", "shape:adr-0012-owl-schema-only"]},
  {slug = "adr-0016-git-ingestion",          needs = ["shape:adr-0011-neptune-sparql", "shape:adr-0012-owl-schema-only"]},

  # Wave 4 — feature specs; depend on wave 3 decisions
  {slug = "adr-0014-mcp-tool-server",        needs = ["shape:adr-0013-multi-strategy-routing"]},
  {slug = "spec-multi-strategy-routing",     needs = ["shape:adr-0013-multi-strategy-routing"]},
  {slug = "spec-normative-partition",        needs = ["shape:adr-0012-owl-schema-only", "shape:adr-0013-multi-strategy-routing"]},
  {slug = "spec-text2sparql-guarded",        needs = ["shape:adr-0011-neptune-sparql", "shape:adr-0012-owl-schema-only"]},
  {slug = "spec-git-ingestion",              needs = ["shape:adr-0016-git-ingestion"]},
  # Extraction + cleansing spec — format router, quality gates, PII flag+restrict, quarantine graph
  {slug = "spec-ingestion-extraction-cleanse", needs = ["shape:adr-0016-git-ingestion", "shape:adr-0012-owl-schema-only"]},
  # Provenance + citations spec — PROV-O model, Silver/Gold artifact metadata, MCP citation format
  {slug = "spec-provenance-citations",       needs = ["shape:adr-0012-owl-schema-only", "shape:spec-rdf-owl-ontology"]},

  # Wave 5 — interface + observability decisions; depend on ADR-0014
  {slug = "adr-0015-otel-observability",     needs = ["shape:adr-0014-mcp-tool-server"]},
  {slug = "spec-mcp-tool-server",            needs = ["shape:adr-0014-mcp-tool-server"]},

  # Wave 6 — final observability spec; depends on ADR-0015
  {slug = "spec-otel-observability",         needs = ["shape:adr-0015-otel-observability"]},
]

["ini-002".work]
# Implementation tasks. No task starts until its named shape deps are agreed.
# Wave ordering mirrors the shape queue; items within a wave run in parallel.
shipped = []
active  = []
queue   = [
  # Wave 1 — infrastructure + archival; unblocked once relevant shape items agreed
  {path = "infra-tf/neptune-sparql-engine",           needs = ["shape:adr-0011-neptune-sparql"]},
  {path = "docs/archive-k8s-specific-specs",          needs = ["shape:rfc-0004-biz-ops-kg-pivot"]},

  # Wave 2 — parallel: SPARQL store migration + mock MCP server (independent)
  # neptune-sparql-store gates all live retrieval work.
  # mcp-mock-server needs only the spec; uses rdflib + in-memory stores — no AWS dep.
  # Build both in parallel; mock unblocks local dev and CI before infra lands.
  {path = "packages/graphrag/neptune-sparql-store",   needs = [
    "work:infra-tf/neptune-sparql-engine",
    "shape:spec-rdf-owl-ontology",
  ]},
  {path = "packages/graphrag/mcp-mock-server",        needs = [
    "shape:spec-mcp-tool-server",
  ]},

  # Wave 3 — parallel live feature implementations; all gate on neptune-sparql-store
  {path = "packages/graphrag/rdf-owl-ontology-loader", needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-rdf-owl-ontology",
    "shape:spec-provenance-citations",
  ]},
  # Extraction + cleansing Fargate task: format router (pandoc/docling/markitdown/Textract),
  # Silver artifact write, PII flagging, quarantine graph, Gold artifact (chunks + PROV-O).
  {path = "packages/graphrag/ingestion-extraction-cleanse", needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-ingestion-extraction-cleanse",
    "shape:spec-provenance-citations",
  ]},
  {path = "packages/graphrag/git-ingestion-pipeline", needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "work:packages/graphrag/ingestion-extraction-cleanse",
    "shape:spec-git-ingestion",
  ]},
  {path = "packages/graphrag/mcp-tool-server",        needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-mcp-tool-server",
    "work:packages/graphrag/mcp-mock-server",
  ]},
  # Local stdio→HTTPS proxy for AI IDE connections via API Gateway.
  # Thin wrapper: translates stdio MCP frames to HTTPS + x-api-key header.
  # No retrieval logic; same config schema as the mock server subprocess.
  {path = "packages/graphrag/mcp-proxy",              needs = [
    "shape:spec-mcp-tool-server",
  ]},
  {path = "packages/graphrag/text2sparql-guarded",    needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-text2sparql-guarded",
  ]},
  {path = "packages/graphrag/normative-retrieval",    needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-normative-partition",
  ]},
  {path = "packages/graphrag/sparql-templates",       needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-multi-strategy-routing",
  ]},
  {path = "docs/supersede-adrs-0001-0004-0008",       needs = [
    "shape:adr-0011-neptune-sparql",
    "shape:spec-text2sparql-guarded",
    "shape:spec-multi-strategy-routing",
  ]},
  {path = "docs/update-existing-specs",               needs = [
    "work:packages/graphrag/neptune-sparql-store",
    "shape:spec-rdf-owl-ontology",
  ]},

  # Wave 4 — integration, observability, final infra + docs; gate on mcp-tool-server
  {path = "packages/graphrag/multi-strategy-router",  needs = [
    "work:packages/graphrag/mcp-tool-server",
    "shape:spec-multi-strategy-routing",
  ]},
  {path = "packages/graphrag/otel-instrumentation",   needs = [
    "work:packages/graphrag/mcp-tool-server",
    "shape:spec-otel-observability",
  ]},
  {path = "infra-tf/mcp-otel-lambda",                 needs = [
    "work:packages/graphrag/mcp-tool-server",
    "shape:adr-0015-otel-observability",
  ]},
  # API Gateway HTTP API in front of the MCP Lambda — human/IDE ingress path.
  # Usage plan + API key auth (no SigV4 on the client side).
  # Function URL retained separately for automation + AgentCore (SigV4/IAM).
  {path = "infra-tf/api-gateway-mcp",                 needs = [
    "work:packages/graphrag/mcp-tool-server",
    "shape:spec-mcp-tool-server",
  ]},
  {path = "infra-tf/git-ingestion-trigger",           needs = [
    "work:packages/graphrag/git-ingestion-pipeline",
    "shape:spec-git-ingestion",
  ]},
  {path = "docs/update-architecture-docs",            needs = [
    "work:packages/graphrag/mcp-tool-server",
    "work:packages/graphrag/neptune-sparql-store",
  ]},
]

[backlog]
open = [

  # ── easy: self-contained code fixes (no live deploy needed) ──────────────

  # Mirror the opensearch urllib fix to neptune: catch HTTPError, return
  # HttpResponse(status, text) instead of raising — same unit test pattern.
  # store/neptune.py _UrllibClient.request.  Source: vector-rag-baseline spec.
  {slug = "neptune-urllib-http-error-idempotency", source = "docs/specs/opensearch-create-index-idempotency/"},

  # Add errors="replace" to the 2xx decode path in _UrllibClient.request
  # (opensearch + neptune) so a malformed-body 200 doesn't bypass _request's
  # uniform RuntimeError.  One-liner; symmetric with the error-path fix.
  {slug = "opensearch-urllib-success-decode", source = "docs/specs/opensearch-create-index-idempotency/"},

  # Clamp k to a sane ceiling at both VectorStore.knn and
  # ParentChildStore.search adapters (cross-cutting one-liner; OWASP API4).
  # Doing only one adapter leaves the sibling inconsistent.
  {slug = "bound-knn-k-at-vector-adapters", source = "docs/specs/parent-child-retrieval/"},

  # Narrow cdk-nag IAM5/IAM4 suppressions from stack-level to specific
  # role/policy constructs via add_resource_suppressions — defence-in-depth
  # gap today; present grants are legitimately scoped.
  # apps/infra/stacks/graphrag_stack.py add_nag_suppressions.
  {slug = "security-hardening-followups-nag-iam-resource-scope", source = "docs/specs/security-hardening-followups/"},

  # Include typed edges (src → kind → dst) from the hop trace in the context
  # synthesize() builds for the Bedrock Claude call — hybrid_query already has
  # the trace with edge kinds; this stops Claude hedging on the ownership chain.
  # Verify: re-run live entity-led query, confirm KEP-1880/2086 named as owned.
  {slug = "hybrid-orchestration-synthesis-edges", source = "docs/specs/hybrid-orchestration/"},

  # Add a debug-level log line on create_index's tolerated-4xx branch so the
  # already-exists tolerance is observable.  Only when the store grows logging;
  # no change to the error contract.
  {slug = "opensearch-urllib-no-trace-on-tolerated-400", source = "docs/specs/opensearch-create-index-idempotency/"},

  # Extract a shared module-level _signed_opencypher helper in store/neptune.py
