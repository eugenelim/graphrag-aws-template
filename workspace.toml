  # Must handle both directions: stale-low (leak) and stale-high (availability).
  {slug = "global-community-summary-delta-tier-refresh", source = "docs/specs/global-community-summary/"},

  # ── live eval / QA (needs a live AWS deploy cycle) ────────────────────────

  # AC9 deferred: deploy slice-1 stack, upload corpus snapshot, run ingestion
