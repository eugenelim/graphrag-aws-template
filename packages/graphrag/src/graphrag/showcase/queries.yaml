# Consolidated showcase query set — the single home for the demo's queries (AC10).
#
# Each query is labeled with the retrieval mode it is meant to WIN (vector | graph |
# hybrid), the gold entity-id(s) and/or chunk-id(s) the trace should surface (every one
# RESOLVES in the bundled fixture corpus — a test asserts this), and a one-line
# highlight the presenter narrates. The presenter script
# (docs/guides/tutorials/three-mode-demo.md) walks vector -> graph -> hybrid over these.
#
# IDs are byte-identical to the slice-1 normalize output (graph node IDs) and the
# slice-2 chunk_corpus ids, so gold can be checked mechanically.

queries:
  # --- vector wins: semantic, prose-rich questions with no entity to seed from ------
  - id: vec-traffic-policy
    query: "How does service internal traffic policy keep traffic node-local?"
    wins: vector
    gold:
      - "enhancements/keps/sig-network/2086-service-internal-traffic-policy/README.md#0"
    highlight: "Semantic match on the KEP-2086 prose; no named entity to seed a graph hop."

  - id: vec-multiple-cidrs
    query: "What problem do multiple service CIDRs solve?"
    wins: vector
    gold:
      - "enhancements/keps/sig-network/1880-multiple-service-cidrs/README.md#0"
    highlight: "Vector finds the KEP-1880 summary from a paraphrase, not a keyword."

  - id: vec-in-place-resize
    query: "Can pod resources be updated in place without a restart?"
    wins: vector
    gold:
      - "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md#0"
    highlight: "Conceptual question lands on the KEP-1287 prose chunk by meaning."

  - id: vec-node-allocatable
    query: "What is legacy node allocatable about?"
    wins: vector
    gold:
      - "enhancements/keps/sig-node/0009-legacy-node-allocatable/README.md#0"
    highlight: "Prose-only KEP (no kep.yaml) — vector retrieves it from the README."

  - id: vec-network-charter
    query: "What is the charter and scope of the networking special interest group?"
    wins: vector
    gold:
      - "community/sig-network/README.md#0"
    highlight: "Charter prose retrieved semantically; the SIG name is paraphrased."

  - id: vec-node-charter
    query: "What does the node group focus on for kubelet and the container runtime?"
    wins: vector
    gold:
      - "community/sig-node/README.md#0"
    highlight: "Semantic hit on the SIG Node charter prose."

  # --- graph wins: entity-led, multi-hop structure vector can't enumerate -----------
  - id: graph-thockin-owned-keps
    query: "Which KEPs does the SIG @thockin tech-leads own?"
    wins: graph
    gold:
      - "person:thockin"
      - "sig:sig-network"
      - "kep-1880"
      - "kep-2086"
    highlight: "2-hop person:thockin -TECH_LEADS-> sig:sig-network -OWNS-> {kep-1880, kep-2086}."

  - id: graph-network-owns
    query: "What KEPs does sig-network own?"
    wins: graph
    gold:
      - "sig:sig-network"
      - "kep-1880"
      - "kep-2086"
    highlight: "OWNS edges from the SIG enumerate the owned set directly."

  - id: graph-node-owns
    query: "What KEPs does SIG Node own?"
    wins: graph
    gold:
      - "sig:sig-node"
      - "kep-9"
      - "kep-1287"
    highlight: "The other SIG's OWNS set — graph keeps the two SIGs cleanly separated."

  - id: graph-kep-1287-approvers
    query: "Who approves KEP-1287?"
    wins: graph
    gold:
      - "kep-1287"
      - "person:thockin"
      - "person:dchen1107"
      - "person:derekwaynecarr"
    highlight: "APPROVES edges (IN) from the KEP name its approvers — a relationship, not prose."

  - id: graph-network-leaders
    query: "Who tech-leads and chairs sig-network?"
    wins: graph
    gold:
      - "sig:sig-network"
      - "person:thockin"
      - "person:bowei"
    highlight: "TECH_LEADS / CHAIRS edges (IN) enumerate the SIG's leadership."

  - id: graph-network-subprojects
    query: "What subprojects does SIG Network have?"
    wins: graph
    gold:
      - "sig:sig-network"
      - "subproject:sig-network/kube-proxy"
      - "subproject:sig-network/external-dns"
    highlight: "HAS_SUBPROJECT edges list the SIG's subprojects structurally."

  # --- hybrid wins: a semantic question whose answer needs the graph join -----------
  - id: hybrid-thockin-traffic
    query: "Of the KEPs the SIG @thockin tech-leads owns, which one keeps traffic node-local?"
    wins: hybrid
    gold:
      - "person:thockin"
      - "sig:sig-network"
      - "kep-2086"
    highlight: "Question seeds @thockin; vector seeds the traffic-policy chunk; the join lands KEP-2086."

  - id: hybrid-network-cidr-detail
    query: "For the SIG that owns multiple service CIDRs, what does that KEP propose?"
    wins: hybrid
    gold:
      - "sig:sig-network"
      - "kep-1880"
    highlight: "Vector finds the CIDR prose; the graph confirms sig-network OWNS KEP-1880."

  - id: hybrid-node-resize-owner
    query: "Which SIG owns the in-place pod resize KEP, and what is it about?"
    wins: hybrid
    gold:
      - "sig:sig-node"
      - "kep-1287"
    highlight: "Vector seeds the KEP-1287 chunk; expansion surfaces the owning SIG Node."

  - id: hybrid-network-charter-keps
    query: "Summarize sig-network's charter and the KEPs it owns."
    wins: hybrid
    gold:
      - "sig:sig-network"
      - "kep-1880"
      - "kep-2086"
      - "community/sig-network/README.md#0"
    highlight: "Vector brings the charter prose; the graph brings the owned-KEP enumeration."

  - id: hybrid-thockin-role
    query: "What does @thockin do across sig-network and its KEPs?"
    wins: hybrid
    gold:
      - "person:thockin"
      - "sig:sig-network"
      - "kep-2086"
    highlight: "Question seeds @thockin; the neighborhood expansion shows his SIG + KEP relationships."

  - id: hybrid-node-allocatable-owner
    query: "Which SIG owns the legacy node allocatable proposal?"
    wins: hybrid
    gold:
      - "sig:sig-node"
      - "kep-9"
    highlight: "Vector finds the prose-only KEP-9; expansion attributes it to SIG Node via OWNS."

# --- slice 4: permission-filtered retrieval (the two-persona contrast) ----------------
# SYNTHETIC visibility labels — a TEACHING stand-in for ACLs, NOT real authz (charter
# principle 5). Each query runs the SAME question under a `persona`; `visible` are the
# entity ids the persona should still see, `filtered` the ones its clearance removes
# (DURING traversal on edges — a forbidden node never enters the frontier). Labels:
# kep-1287=restricted, kep-1880=internal (see src/graphrag/labels.yaml).
permission_queries:
  - id: perm-node-keps-public-reader
    query: "What KEPs does SIG Node own?"
    persona: public-reader
    visible:
      - "sig:sig-node"
      - "kep-9"
    filtered:
      - "kep-1287"
    highlight: "public-reader sees kep-9; the restricted KEP-1287 is filtered DURING traversal — the OWNS edge into it is never followed, so it can't leak via a hop."

  - id: perm-node-keps-maintainer
    query: "What KEPs does SIG Node own?"
    persona: maintainer
    visible:
      - "sig:sig-node"
      - "kep-9"
      - "kep-1287"
    filtered: []
    highlight: "Same question, maintainer clearance: the restricted KEP-1287 the public-reader could not see is now in the result — the divergence is the teaching point."

  - id: perm-network-keps-public-reader
    query: "What KEPs does sig-network own?"
    persona: public-reader
    visible:
      - "sig:sig-network"
      - "kep-2086"
    filtered:
      - "kep-1880"
    highlight: "kep-1880 is labeled internal — filtered for a public-reader; the public kep-2086 remains."

  - id: perm-network-keps-member
    query: "What KEPs does sig-network own?"
    persona: member
    visible:
      - "sig:sig-network"
      - "kep-1880"
      - "kep-2086"
    filtered: []
    highlight: "member clearance (public + internal) sees the internal KEP-1880 a public-reader cannot — the middle tier of the three-persona contrast."

# opencypher-templates (governed Cypher-Templates path). Each query names the template a
# correct selector should pick, the parameter that should be bound from the question, and
# the gold rows the parameterized openCypher should return (all resolving in the fixture
# corpus). The loader/test runs each template with its param and asserts rows == gold.
governed_queries:
  - id: governed-sig-owned-keps
    query: "Which KEPs does SIG Network own?"
    template: sig_owned_keps
    param: "sig:sig-network"
    gold:
      - "kep-1880"
      - "kep-2086"
    highlight: "Selector picks sig_owned_keps; $sig binds to sig:sig-network; the vetted OWNS query returns the owned KEPs."

  - id: governed-sig-tech-leads
    query: "Who tech-leads SIG Network?"
    template: sig_tech_leads
    param: "sig:sig-network"
    gold:
      - "person:aojea"
      - "person:danwinship"
      - "person:thockin"
    highlight: "Same SIG parameter, a different vetted template (TECH_LEADS, incoming) — selection chooses the query, not the value."

  - id: governed-person-led-sigs
    query: "What SIGs does @thockin tech-lead?"
    template: person_led_sigs
    param: "person:thockin"
    gold:
      - "sig:sig-network"
    highlight: "A person parameter; the @handle is normalized + store-confirmed to person:thockin before binding."

  - id: governed-kep-owning-sig
    query: "Which SIG owns KEP-2086?"
    template: kep_owning_sig
    param: "kep-2086"
    gold:
      - "sig:sig-network"
    highlight: "A KEP parameter resolved from the question; the OWNS edge is traversed inbound to the owning SIG."

# text2opencypher-guarded (flexible / risky path). The LLM WRITES the openCypher; these are
# the side-by-side teaching set. At least one question is SHARED with a governed template (the
# head-to-head — same question, both paths), and the rest are OPEN-ENDED questions no governed
# template covers (authorship, approvals, subprojects) — the coverage text2cypher buys at the
# cost of needing the read-only guard. `gold` are nodes that resolve in the fixture corpus (a
# test asserts this); `shared_with_template` names the governed template for the head-to-head.
text2cypher_queries:
  - id: t2c-sig-owned-keps
    query: "Which KEPs does SIG Network own?"
    shared_with_template: sig_owned_keps
    gold:
      - "kep-1880"
      - "kep-2086"
    highlight: "The head-to-head: the SAME question the governed sig_owned_keps template answers; here the model WRITES the OWNS query instead of selecting a vetted one."
  - id: t2c-keps-authored-by-aojea
    query: "Which KEPs did @aojea author?"
    gold:
      - "kep-1880"
    highlight: "Open-ended: no governed template covers AUTHORS - the flexibility text2cypher buys, at the cost of the read-only guard."
  - id: t2c-keps-approved-by-thockin
    query: "Which KEPs has @thockin approved?"
    gold:
      - "kep-1287"
      - "kep-1880"
      - "kep-2086"
    highlight: "Open-ended: APPROVES is untemplated - the model authors the traversal the question needs."
  - id: t2c-sig-node-subprojects
    query: "What subprojects does SIG Node have?"
    gold:
      - "subproject:sig-node/cri-api"
    highlight: "Open-ended: HAS_SUBPROJECT is untemplated - coverage of a question no one wrote a template for."

# metadata-filtering (self-query) path. The LLM reads a STRUCTURED FILTER out of the question
# over the fixed schema (`source` = community|enhancements; `entity_ids` = a resolved graph-node
# id), and the vector search applies it DURING the ANN scan (Lucene engine). `expected_filter`
# is the structured filter a correct extractor reads from the question; `mode` is the leg the
# filter applies in (vector | hybrid's vector leg); `visible`/`excluded` are fixture chunk ids
# the filter should keep / prune. A loader/test asserts every named entity + chunk id resolves
# in the fixture corpus. (Contrast with permission_queries: that filter is the FIXED persona
# clearance; this one is QUESTION-derived.)
selfquery_queries:
  - id: sq-enhancements-sig-network-vector
    query: "in the enhancements repo, which KEPs are owned by SIG Network?"
    mode: vector
    expected_filter:
      source: ["enhancements"]
      entity_ids: ["sig:sig-network"]
    visible:
      - "enhancements/keps/sig-network/1880-multiple-service-cidrs/README.md#0"
      - "enhancements/keps/sig-network/2086-service-internal-traffic-policy/README.md#0"
    excluded:
      - "community/sig-network/README.md#0"
    highlight: "source=enhancements AND entity=SIG Network: the self-query filter narrows the k-NN candidates to SIG Network's KEP docs in the enhancements repo, dropping its community charter DURING the ANN scan."
  - id: sq-community-sig-node-vector
    query: "what does the SIG Node community charter cover?"
    mode: vector
    expected_filter:
      source: ["community"]
      entity_ids: ["sig:sig-node"]
    visible:
      - "community/sig-node/README.md#0"
    excluded:
      - "enhancements/keps/sig-node/0009-legacy-node-allocatable/README.md#0"
      - "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md#0"
    highlight: "source=community flips the repo filter: the same SIG Node entity now scopes to the charter chunk, excluding its enhancements KEPs — the cross-source filter the question carries."
  - id: sq-enhancements-sig-node-hybrid
    query: "in the enhancements repo, what does SIG Node own?"
    mode: hybrid
    expected_filter:
      source: ["enhancements"]
      entity_ids: ["sig:sig-node"]
    visible:
      - "enhancements/keps/sig-node/0009-legacy-node-allocatable/README.md#0"
      - "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md#0"
    excluded:
      - "community/sig-node/README.md#0"
    highlight: "hybrid mode: the self-query filter is threaded into the vector LEG, so the seed-and-expand path seeds only from SIG Node's enhancements chunks — the graph traversal is unchanged."
  - id: sq-enhancements-only-hybrid
    query: "across the enhancements repo, summarize the in-place pod resize work"
    mode: hybrid
    expected_filter:
      source: ["enhancements"]
    visible:
      - "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md#0"
    excluded:
      - "community/sig-node/README.md#0"
      - "community/sig-network/README.md#0"
    highlight: "a source-only self-query filter (no entity): hybrid's vector leg scans only enhancements chunks, so no community charter can seed the expansion."

# Parent-Child Retriever (parent-child-retrieval slice): a small CHILD chunk's vector is
# matched (precise), but the larger PARENT document body is returned for context-complete
# synthesis. Each entry names the gold matched child (the precise unit) and the returned
# parent (the doc whose full body synthesis reads), plus the contrast against flat `vector`
# mode (the same question returns a single matched chunk, not the whole parent). All ids
# resolve in the fixture corpus.
parentchild_queries:
  - id: pc-pod-resize-rollout
    query: "what does the in-place pod resize KEP say about its risks and rollout?"
    expected_matched_child: "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md#1"
    expected_parent: "enhancements/keps/sig-node/1287-in-place-update-pod-resources/README.md"
    contrast: "flat vector mode returns just the matched 'Risks and Mitigations' chunk; parent-child returns the whole KEP-1287 README body so synthesis also sees the Summary the risks depend on."
    highlight: "precise child match (Risks and Mitigations) -> the full KEP-1287 parent body for context-complete synthesis."
  - id: pc-service-traffic-policy
    query: "what is the service internal traffic policy enhancement about?"
    expected_matched_child: "enhancements/keps/sig-network/2086-service-internal-traffic-policy/README.md#0"
    expected_parent: "enhancements/keps/sig-network/2086-service-internal-traffic-policy/README.md"
    contrast: "flat vector mode returns only the matched Summary chunk; parent-child returns the whole KEP-2086 README (Summary + Motivation) as one parent."
    highlight: "the child Summary matches; the parent body carries the surrounding Motivation the flat chunk would truncate."
  - id: pc-sig-node-charter
    query: "what does the SIG Node charter describe as its scope?"
    expected_matched_child: "community/sig-node/README.md#1"
    expected_parent: "community/sig-node/README.md"
    contrast: "flat vector mode returns just the matched 'Scope' chunk; parent-child returns the whole SIG Node charter so synthesis sees the charter intro and scope together."
    highlight: "a community-charter parent: the precise Scope child match returns the full charter body for synthesis."

# --- global-community-summary: corpus-wide map-reduce over community summaries (AC9) ----
# Each query is CORPUS-WIDE — there is no single seed entity for the seed-and-expand hybrid to
# expand from; the answer is the shape of the whole corpus. expected_entities name entities that
# appear in the contributing communities (all resolve in the fixture corpus AFTER detection).
# On the fixture corpus Louvain finds communities spanning all three visibility tiers — a
# SIG-Node cluster (restricted), a SIG-Network cluster (internal), and a service-traffic cluster
# (public) — pinned by test_showcase.test_fixture_yields_all_three_visibility_tiers.
global_queries:
  - id: gl-areas-of-work
    query: "What are the major areas of work across all the Kubernetes SIGs, and how do they relate?"
    expected_entities:
      - "sig:sig-node"
      - "sig:sig-network"
      - "kep-2086"
    theme: "the corpus splits into a SIG-Node cluster, a SIG-Network cluster, and a service-traffic cluster — three areas of work, each its own community."
    highlight: "no seed entity to expand from — the answer is the corpus-wide community structure, map-reduced over the per-community summaries."
  - id: gl-key-people
    query: "Who are the key people across the project and what areas do they work on?"
    expected_entities:
      - "person:thockin"
      - "person:dchen1107"
      - "person:aojea"
    theme: "leadership spans the three communities — SIG-Node, SIG-Network, and the service-traffic area each surface their own people."
    highlight: "a corpus-wide 'who works on what' that no single graph hop answers — synthesized across every community summary in clearance."
  - id: gl-kep-breadth
    query: "Summarize the breadth of KEPs in the corpus and the SIGs that own them."
    expected_entities:
      - "kep-1287"
      - "kep-1880"
      - "kep-2086"
      - "sig:sig-node"
      - "sig:sig-network"
    theme: "each SIG owns a cluster of KEPs — node-lifecycle KEPs under SIG-Node, networking KEPs under SIG-Network — surfaced as distinct community summaries."
    highlight: "breadth across the whole KEP corpus, reduced from the community summaries rather than a single retrieval."

# schema-guided-extraction: questions answerable ONLY via a schema-guided LLM edge — a free-narrative
# inter-entity relationship the deterministic graph structurally cannot reach (the contrast the slice
# teaches). `mode` is the retrieval mode (graph/hybrid) that traverses the LLM edge; `llm_edge` is the
# (src, kind, dst) the answer leans on; `expected_entities` resolve in the fixture corpus.
extraction_queries:
  - id: ex-sig-collaboration
    query: "Which SIGs does SIG Network collaborate with?"
    mode: "hybrid"
    llm_edge: ["sig:sig-network", "COLLABORATES_WITH", "sig:sig-node"]
    expected_entities:
      - "sig:sig-network"
      - "sig:sig-node"
    highlight: "the deterministic graph has no SIG->SIG edge — only the schema-guided COLLABORATES_WITH edge, read from the SIG-Network charter prose, answers this."
  - id: ex-kep-dependency
    query: "Which KEP does the Service Internal Traffic Policy KEP depend on?"
    mode: "graph"
    llm_edge: ["kep-2086", "DEPENDS_ON", "kep-1880"]
    expected_entities:
      - "kep-2086"
      - "kep-1880"
    highlight: "KEP->KEP dependency stated only in the KEP-2086 Motivation prose — invisible to the labeled-field deterministic extractor."
  - id: ex-kep-supersession
    query: "Which earlier KEP does the in-place pod resources KEP supersede?"
    mode: "graph"
    llm_edge: ["kep-1287", "SUPERSEDES", "kep-9"]
    expected_entities:
      - "kep-1287"
      - "kep-9"
    highlight: "a supersession relationship the deterministic graph cannot reach — recovered from prose, written as a distinguishable schema-guided-llm edge."
