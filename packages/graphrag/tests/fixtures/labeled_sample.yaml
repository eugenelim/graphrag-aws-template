# Hand-labeled sample for the resolver "open confirmation" (AC5).
#
# Each mention is a *real* form as it appears across the two repos (the @-prefix
# and case inconsistencies are verbatim), plus the harder prose display-name forms
# a real corpus carries. `gold` is the independently-known canonical identity.
# The eval scores the resolver's clustering pairwise (precision/recall ≥ 0.80).
#
# This deliberately includes un-aliased prose names (e.g. "Guilherme Cassolato",
# "Bowei Du") that the alias table does NOT cover — so the resolver genuinely
# misses them (false negatives) and the metric has teeth rather than being a
# constructed 1.0. The de-risk verdict's bar is ≥0.80, not perfection.
mentions:
