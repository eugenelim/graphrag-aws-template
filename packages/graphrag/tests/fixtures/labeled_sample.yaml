  - { raw: "@thockin", source: enhancements, gold: thockin }      # KEP approver
  - { raw: "thockin", source: community, gold: thockin }          # SIG tech_lead (bare)
  - { raw: "@Thockin", source: enhancements, gold: thockin }      # case variant
  - { raw: "Tim Hockin", source: enhancements, gold: thockin }    # legacy prose (aliased)

  # --- aojea: cross-source handle + prose (aliased) ---
