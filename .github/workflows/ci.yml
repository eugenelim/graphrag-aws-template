# CI gate (security-hardening-followups AC6/AC6b). A green run on push + PR is the merge
# gate. Commands are pinned and match AGENTS.md § Commands; ruff/mypy versions are pinned in
# pyproject [dev] so this gate is deterministic.
#
# Self-hardening (AC6b): least-privilege GITHUB_TOKEN (contents:read only); `pull_request`
# (NOT pull_request_target — never run untrusted-PR code with a write token); and every
# `uses:` is pinned to a 40-char commit SHA (Dependabot's github-actions ecosystem bumps them).
name: CI

on:
  push:
  pull_request:

# Least privilege: the gate only reads the repo. No job needs write.
permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install (project + dev + infra extras)
        run: |
          python -m pip install --upgrade pip  # current pip — also clears pip's own CVEs
          python -m pip install -e ".[dev,infra]"

      - name: Lint (ruff check)
        run: ruff check packages apps
      - name: Format check (ruff format --check)
        run: ruff format --check packages apps
      - name: Typecheck (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest

      - name: Supply-chain audit (pip-audit)
        run: |
          # Audit the installed dependency closure; honor reason+expiry suppressions from
          # .pip-audit-ignore (one vuln id per non-comment line). Fails on any other vuln.
          ignores=()
          while IFS= read -r id; do
            ignores+=(--ignore-vuln "$id")
          done < <(grep -vE '^[[:space:]]*#|^[[:space:]]*$' .pip-audit-ignore | awk '{print $1}')
          python -m pip_audit "${ignores[@]}"

      # cdk synth with cdk-nag as a hard gate (AC4/AC6): an unsuppressed AwsSolutions finding
      # fails the synth. The in-process nag assertion also runs under pytest above (AC4a); this
      # step additionally proves the app.py aspect wiring end-to-end via the real CLI.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install cdk CLI
        # Version-pinned (not digest-pinned, unlike the SHA-pinned actions above): accepted
        # residual — the gate has no write token (contents: read), so a registry-tamper blast
        # radius is read-only. Tracked under infra-secret-scan-ci.
        run: npm install -g aws-cdk@2.1128.1
      - name: Synth + cdk-nag (cdk synth)
        working-directory: apps/infra
        run: cdk synth --quiet

      # Secret scanner (infra-secret-scan-ci): detect-secrets on the full repo.
      # .agentbundle-state.toml is excluded — it contains hex digests of binary
      # bundles (not secrets). plan.json fixture is excluded — Terraform state JSON.
      - name: Install detect-secrets
        run: python -m pip install detect-secrets==1.5.0
      - name: Secret scan (detect-secrets)
        run: |
          detect-secrets scan --no-verify \
            --exclude-files '\.agentbundle-state\.toml' \
            --exclude-files 'apps/infra-tf/tests/fixtures/plan\.json' \
            > /tmp/secrets-scan.json
          count=$(jq '.results | length' /tmp/secrets-scan.json)
          if [ "$count" -gt 0 ]; then
            echo "SECRETS DETECTED:" >&2
            jq -r '.results | to_entries[] | .key as $f | .value[] | "\($f):\(.line_number)  \(.type)"' \
              /tmp/secrets-scan.json >&2
            exit 1
          fi
          echo "No secrets detected."

      # Shellcheck (infra-secret-scan-ci): static analysis for all .sh scripts.
      # -x follows source'd files so sourced helper scripts are also checked.
      - name: Shellcheck
        run: |
          find . -name '*.sh' -not -path '*/.terraform/*' -not -path '*/node_modules/*' \
          | xargs shellcheck -x

  tf-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Terraform plan-assertion tests
        working-directory: apps/infra-tf
        env:
          TFPLAN_JSON_PATH: tests/fixtures/plan.json
        run: pytest tests/ -q

      # IaC scanner (infra-terraform-scanner-ci): Trivy config scan on the Terraform sources.
      # .trivyignore in apps/infra-tf/ suppresses accepted-risk findings (CMK cost, mutable ECR
      # tags). tests/ is excluded — plan.json is a test fixture, not live infrastructure code.
      - name: Install Trivy
        # Version-pinned install script; no write token means a compromised release has read-only
        # blast radius. Trivy version bumps are manual — tracked with the project dependency log.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.72.0
      - name: IaC scan (trivy config)
        working-directory: apps/infra-tf
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL --skip-dirs tests .
