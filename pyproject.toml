[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "graphrag-aws-demo"
version = "0.1.0"
description = "GraphRAG-on-AWS reference demo — graph ingestion + cross-source entity resolution (slice 1)"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "boto3>=1.34",
]

[project.optional-dependencies]
# IaC toolchain — isolated so the runtime app never imports CDK.
infra = [
    "aws-cdk-lib>=2.140",
    "constructs>=10.3",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.scripts]
graphrag = "graphrag.cli:main"

[tool.setuptools.packages.find]
where = ["packages/graphrag/src"]

[tool.setuptools.package-data]
graphrag = ["aliases.yaml", "py.typed"]

[tool.pytest.ini_options]
testpaths = ["packages/graphrag/tests", "apps/ingestion/tests", "apps/infra/tests"]
pythonpath = ["packages/graphrag/src", "apps", "apps/infra"]

[tool.ruff]
line-length = 100
src = ["packages/graphrag/src", "apps"]

[tool.ruff.lint]
# E/F pyflakes+pycodestyle, I import-sort, UP pyupgrade, B bugbear,
# S flake8-bandit (security — catches unsafe yaml.load as S506).
select = ["E", "F", "I", "UP", "B", "S"]

[tool.ruff.lint.per-file-ignores]
# Tests: asserts (S101) and mock/fake credentials (S105/S106) are expected.
"**/tests/**" = ["S101", "S105", "S106"]

[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
disallow_untyped_defs = true
files = ["packages/graphrag/src", "apps"]
# cdk synth copies the graphrag package into apps/infra/cdk.out/asset.*/ (the
# Lambda bundle); exclude it so mypy doesn't see a duplicate `graphrag` module.
exclude = "(^|/)cdk\\.out/"

[[tool.mypy.overrides]]
module = ["yaml", "boto3", "boto3.*", "botocore", "botocore.*", "aws_cdk", "aws_cdk.*", "constructs"]
ignore_missing_imports = true
